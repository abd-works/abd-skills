# Ensure vendored copies under skills/*/scripts/ match canonical src/drawio.
name: Vendor sync check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-drawio-vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify DrawIO vendor files match src/drawio
        run: python scripts/sync_drawio_vendor.py --check
