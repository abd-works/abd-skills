         <mxGeometry x=\"12290\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/add-product-to-cart/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer adds multiple different &lt;i&gt;products&lt;/i&gt; to the &lt;i&gt;shopping cart&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; each &lt;i&gt;product&lt;/i&gt; appears as its own &lt;i&gt;cart item&lt;/i&gt; with its own quantity&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the visible item count indicator shows the total number of units or distinct lines  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;shopping cart&lt;/i&gt; accumulates &lt;i&gt;cart item&lt;/i&gt; with quantities\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12290\" y=\"587\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/add-product-to-cart/ac-4\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a guest customer&amp;#x27;s browser session ends before checkout completes&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;shopping cart&lt;/i&gt; contents are not available in a new session  &#10;   &lt;b&gt;BUT&lt;/b&gt; in-session cart changes remain until checkout completes or the session ends  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;shopping cart&lt;/i&gt; in Increment 2 is session-scoped for guest customers; thin-slicing.md \u2014 Increment 2, no accounts yet\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12290\" y=\"674\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/update-cart-quantity\" value=\"Update Cart Quantity\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12550\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/update-cart-quantity/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer changes the quantity on a &lt;i&gt;cart item&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the line total recalculates based on the new quantity&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the cart total recalculates  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;shopping cart&lt;/i&gt; accumulates &lt;i&gt;cart item&lt;/i&gt; with quantities\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12550\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/update-cart-quantity/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer sets quantity to zero on a &lt;i&gt;cart item&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;cart item&lt;/i&gt; is removed from the &lt;i&gt;shopping cart&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the cart total and visible item count indicator update  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;cart item&lt;/i&gt; quantity must be at least one; zero is equivalent to removal\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12550\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/update-cart-quantity/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer enters a negative number or non-numeric value for quantity&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the cart shows a validation error on that line  &#10;   &lt;b&gt;BUT&lt;/b&gt; the previous quantity is not changed  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard form validation\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12550\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/update-cart-quantity/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer enters a quantity greater than current &lt;i&gt;stock availability&lt;/i&gt; allows&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the cart shows a validation error on that &lt;i&gt;cart item&lt;/i&gt;  &#10;   &lt;b&gt;BUT&lt;/b&gt; the previous quantity is not changed  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;shopping cart&lt;/i&gt; validates &lt;i&gt;cart item&lt;/i&gt; quantities against current &lt;i&gt;stock availability&lt;/i&gt; at render time\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12550\" y=\"587\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/remove-product-from-cart\" value=\"Remove Product from Cart\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12810\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/remove-product-from-cart/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer selects remove on a &lt;i&gt;cart item&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; that &lt;i&gt;product&lt;/i&gt; is removed from the &lt;i&gt;shopping cart&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the cart total and visible item count indicator update immediately  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;shopping cart&lt;/i&gt; / &lt;i&gt;cart item&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12810\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/remove-product-from-cart/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer removes the last &lt;i&gt;cart item&lt;/i&gt; in the &lt;i&gt;shopping cart&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the cart shows an empty state with guidance to continue shopping  &#10;   &lt;b&gt;BUT&lt;/b&gt; no checkout flow is accessible from an empty cart  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 empty cart guard\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12810\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/remove-product-from-cart/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;shopping cart&lt;/i&gt; becomes empty&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; a continue-shopping affordance returns the customer to the &lt;i&gt;product catalog&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard empty-cart recovery\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"12810\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/manage-shopping-cart/persist-cart-across-devices\" value=\"Persist Cart Across Devices\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13070\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out\" value=\"Check Out\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13135\" y=\"195\" width=\"1620\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/enter-shipping-address\" value=\"Enter Shipping Address\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13140\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/enter-shipping-address/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer reaches the shipping step on a ship-to-home checkout path&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the checkout presents a &lt;i&gt;shipping address&lt;/i&gt; form&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the form collects: name, address line 1, address line 2 (optional), city, county or region, postcode, and country  &#10;   &lt;b&gt;BUT&lt;/b&gt; the step does not apply ;AND&lt;/b&gt; the remaining pre-filled fields are unchanged  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 individual field overrides replace only the changed field\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13140\" y=\"500\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/enter-shipping-address/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer submits the &lt;i&gt;shipping address&lt;/i&gt; with required fields missing&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the form highlights the missing fields with clear validation messages  &#10;   &lt;b&gt;BUT&lt;/b&gt; the checkout does not advance to &lt;i&gt;delivery option&lt;/i&gt; selection  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;shipping address&lt;/i&gt; invariant: required fields must be complete before checkout advances from the shipping step\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13140\" y=\"587\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/enter-shipping-address/ac-4\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer completes the &lt;i&gt;shipping address&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the checkout advances to the &lt;i&gt;delivery option&lt;/i&gt; selection step&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the entered &lt;i&gt;shipping address&lt;/i&gt; is shown in the order summary for review  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;shipping address&lt;/i&gt; is copied onto the confirmed &lt;i&gt;order&lt;/i&gt; and shown in the order summary\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13140\" y=\"661\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/enter-billing-address\" value=\"Enter Billing Address\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13400\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/enter-billing-address/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer reaches the billing step in checkout&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the address form collects: name, address line 1, address line 2 (optional), city, county/state, postcode, and country  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 17, &amp;quot;Checkout flow: shipping address, billing address&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;billing address&lt;/i&gt; required on every Increment 2 &lt;i&gt;order&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13400\" y=\"339\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/enter-billing-address/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer submits the &lt;i&gt;billing address&lt;/i&gt; with required fields missing&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the form highlights the missing fields with clear validation messages  &#10;   &lt;b&gt;BUT&lt;/b&gt; the checkout does not advance to &lt;i&gt;payment&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; u ntColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13400\" y=\"574\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-saved-address-at-checkout\" value=\"Select Saved Address at Checkout\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13660\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-saved-address-at-checkout/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a logged-in customer reaches the shipping step during checkout&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; all &lt;i&gt;saved address&lt;/i&gt; from the &lt;i&gt;address book&lt;/i&gt; are shown for selection&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;default address&lt;/i&gt; is pre-selected&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;saved address&lt;/i&gt; pre-fills checkout shipping step when selected; &lt;i&gt;default address&lt;/i&gt; pre-selected\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13660\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-saved-address-at-checkout/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer selects a &lt;i&gt;saved address&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the shipping address fields are auto-filled with that address&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; checkout advances to the next step without manual entry&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;saved address&lt;/i&gt; pre-fills checkout shipping step\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13660\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-saved-address-at-checkout/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer chooses to use a new address not in the &lt;i&gt;address book&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; a &amp;quot;use a different address&amp;quot; option reveals manual address entry&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; a &amp;quot;save this address&amp;quot; checkbox adds the new address to the &lt;i&gt;address book&lt;/i&gt; when checked (see &lt;i&gt;Save Delivery Address&lt;/i&gt;)&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;address book&lt;/i&gt; accepts new entries from checkout\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13660\" y=\"513\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-saved-address-at-checkout/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a guest customer (not logged in) reaches the shipping step&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; no &lt;i&gt;address book&lt;/i&gt; selection is shown \u2014 only manual address entry&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; a prompt to log in or register mentions the benefit of &lt;i&gt;saved address&lt;/i&gt;&#10;   &lt;b&gt;BUT&lt;/b&gt; &lt;i&gt;guest checkout&lt;/i&gt; proceeds without requiring an account&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;guest checkout&lt;/i&gt; remains available alongside logged-in checkout; Increment 1\u20133 shipping paths preserved\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13660\" y=\"600\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-delivery-option\" value=\"Select Delivery Option\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13920\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-delivery-option/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer reaches the delivery selection step&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the available &lt;i&gt;delivery option&lt;/i&gt; choices are &lt;i&gt;standard delivery&lt;/i&gt; and &lt;i&gt;click-and-collect&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; &lt;i&gt;standard delivery&lt;/i&gt; shows an estimated delivery window and shipping cost  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 17, &amp;quot;delivery options (standard, express, maybe same-day for local)&amp;quot;; ubiquitous-language.md \u2014 Increment 3 offers &lt;i&gt;standard delivery&lt;/i&gt; and &lt;i&gt;click-and-collect&lt;/i&gt;; thin-slicing.md \u2014 Increment 3, standard delivery only\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13920\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-delivery-option/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer selects &lt;i&gt;standard delivery&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt =\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-delivery-option/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; express or same-day &lt;i&gt;delivery option&lt;/i&gt; variants are not yet available (deferred per thin slicing)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; they do not appear in the selection \u2014 the customer sees only &lt;i&gt;standard delivery&lt;/i&gt; and &lt;i&gt;click-and-collect&lt;/i&gt;  &#10;   &lt;b&gt;BUT&lt;/b&gt; the UI is structured to accommodate additional options in future increments without redesign  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; thin-slicing.md \u2014 Increment 3, &amp;quot;Standard delivery only \u2014 defer express and same-day&amp;quot;; ubiquitous-language.md \u2014 express and same-day deferred\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"13920\" y=\"600\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-click-and-collect-store\" value=\"Select Click-and-Collect Store\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"14180\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-click-and-collect-store/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer reaches the delivery step in checkout&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; &lt;i&gt;click-and-collect&lt;/i&gt; is the only &lt;i&gt;delivery option&lt;/i&gt; presented&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the store selection list shows available &lt;i&gt;store&lt;/i&gt; locations with &lt;i&gt;address&lt;/i&gt;, &lt;i&gt;operating hours&lt;/i&gt;, and &lt;i&gt;distance&lt;/i&gt; (when customer location is known from Increment 1)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 29, &amp;quot;click-and-collect should probably be an option. Order online, pick up at your local store&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;click-and-collect&lt;/i&gt; sole &lt;i&gt;delivery option&lt;/i&gt; in Increment 2\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"14180\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-click-and-collect-store/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer selects a &lt;i&gt;pickup store&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; that &lt;i&gt;store&lt;/i&gt; is recorded as the collection location for the &lt;i&gt;order&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; no shipping address is required (&lt;i&gt;click-and-collect&lt;/i&gt; replaces delivery)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;click-and-collect&lt;/i&gt; invariant: must reference a specific &lt;i&gt;pickup store&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"14180\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-click-and-collect-store/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer has not provided location data&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; all &lt;i&gt;store&lt;/i&gt; locations are still listed (the customer may be willing to travel)  &#10;   &lt;b&gt;BUT&lt;/b&gt; a note suggests entering a &lt;i&gt;postcode&lt;/i&gt; or sharing &lt;i&gt;shared location&lt;/i&gt; for distance-sorted results  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 &lt;i&gt;click-and-collect&lt;/i&gt; should not be blocked by missing location; Increment 1 &lt;i&gt;store locator&lt;/i&gt; distance behavior\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"14180\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/select-click-and-collect-store/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer confirms &lt;i&gt;click-and-collect&lt;/i&gt; with a &lt;i&gt;pickup store&lt;/i&gt; selected&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the checkout summary shows the chosen &lt;i&gt;pickup store&lt;/i&gt; name and &lt;i&gt;address&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;pickup store&lt;/i&gt; displays on &lt;i&gt;order confirmation page&lt;/i&gt; and in &lt;i&gt;confirmation email&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"14180\" y=\"587\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/check-out-as-guest\" value=\"Check Out as Guest\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"14440\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/check-out/check-out-as-guest/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer proceeds to checkout without being logged in&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system o hod selector&lt;/i&gt;&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;webhook callback&lt;/i&gt; reconciles in-flight &lt;i&gt;payment&lt;/i&gt; after timeout; applies uniformly across &lt;i&gt;StripeWave&lt;/i&gt;, &lt;i&gt;PayNova&lt;/i&gt;, and &lt;i&gt;VaultPay&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"15550\" y=\"626\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/process-digital-wallet-payment-via-paynova/ac-4\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a logged-in customer completes a PayNova &lt;i&gt;payment&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the checkout offers to save PayNova as a &lt;i&gt;saved payment method&lt;/i&gt; on the &lt;i&gt;customer account&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; only a PayNova vendor token is stored \u2014 not wallet secrets&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;saved payment method&lt;/i&gt; supports PayNova wallet tokens; &lt;i&gt;PayNova&lt;/i&gt; offers save-as-&lt;i&gt;saved payment method&lt;/i&gt; for logged-in customers\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"15550\" y=\"720\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/process-buy-now-pay-later-via-vaultpay\" value=\"Process Buy-Now-Pay-Later via VaultPay\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"15810\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/process-buy-now-pay-later-via-vaultpay/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer selects &lt;i&gt;VaultPay&lt;/i&gt; at the &lt;i&gt;payment method selector&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the checkout redirects to or embeds VaultPay&amp;#x27;s BNPL flow&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; VaultPay performs the &lt;i&gt;eligibility check&lt;/i&gt; and presents the &lt;i&gt;instalment plan&lt;/i&gt; to the customer&#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 17, &amp;quot;VaultPay is our buy-now-pay-later provider&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;VaultPay&lt;/i&gt; performs &lt;i&gt;eligibility check&lt;/i&gt; and presents &lt;i&gt;instalment plan&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"15810\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/process-buy-now-pay-later-via-vaultpay/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer accepts the &lt;i&gt;instalment plan&lt;/i&gt; and VaultPay returns &lt;i&gt;payment confirmation&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; status transitions to confirmed&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;payment&lt;/i&gt; is recorded with vendor = VaultPay and the &lt;i&gt;vendor transaction reference&lt;/i&gt; plus instalment reference&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the system sends the &lt;i&gt;confirmation email&lt;/i&gt; and displays the order confirmation page&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;instalment plan&lt;/i&gt; carries schedule owned by VaultPay; PawPlace records reference on &lt;i&gt;payment&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"15810\" y=\"426\" width=\"250\" height=\"90\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/process-buy-now-pay-later-via-vaultpay/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; VaultPay returns a &lt;i&gt;hard decline&lt;/i&gt; (eligibility failed, credit check failed, etc.)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the customer sees a clear message that &lt;i&gt;buy-now-pay-later&lt;/i&gt; is not available for this transaction&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;payment method selector&lt;/i&gt; displays &lt;i&gt;StripeWave&lt;/i&gt; and &lt;i&gt;PayNova&lt;/i&gt; as alternative options&#10;   &lt;b&gt;BUT&lt;/b&gt; no &lt;i&gt;order&lt;/i&gt; is confirmed \u2014 the decline is VaultPay&amp;#x27;s decision, not PawPlace&amp;#x27;s&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 VaultPay declines are VaultPay&amp;#x27;s decision; PawPlace surfaces unavailability and offers &lt;i&gt;StripeWave&lt;/i&gt; and &lt;i&gt;PayNova&lt;/i&gt; alternatives\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"15810\" y=\"526\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/process-buy-now-pay-later-via-vaultpay/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;webhook callback&lt;/i&gt; from VaultPay arrives after a timeout on an in-flight &lt;i&gt;payment&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system reconciles the callback against the pending &lt;i&gt;payment&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; if &lt;i&gt;payment confirmation&lt;/i&gt; succeeded, the &lt;i&gt;order&lt;/i&gt; transitions to confirmed and the &lt;i&gt;confirmation email&lt;/i&gt; fires&#10;   &lt;b&gt;BUT&lt;/b&gt; if the &lt;i&gt;payment&lt;/i&gt; failed, the &lt;i&gt;order&lt;/i&gt; remains unpaid and the customer is notified to retry&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;webhook callback&lt;/i&gt; applies uniformly across all &lt;i&gt;payment vendor&lt;/i&gt; subtypes\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"15810\" y=\"613\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/process-buy-now-pay-later-via-vaultpay/ac-4\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a logged-in customer completes a VaultPay &lt;i&gt;payment&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the checkout offers to save VaultPay as a &lt;i&gt;saved payment method&lt;/i&gt; on the &lt;i&gt;customer account&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; future VaultPay checkout pre-fills the customer&amp;#x27;s VaultPay identity but still requires &lt;i&gt;eligibility check&lt;/i&gt; per transaction&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;VaultPay&lt;/i&gt; offers save-as-&lt;i&gt;saved payment method&lt;/i&gt;; pre-fills identity but requires &lt;i&gt;eligibility check&lt;/i&gt; each transaction\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"15810\" y=\"700\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/retry-failed-payment\" value=\"Retry Failed Payment\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16070\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/retry-failed-payment/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a &lt;i&gt;payment&lt;/i&gt; fails due to a &lt;i&gt;transient error&lt;/i&gt; (timeout, vendor 5xx, network issue)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system automatically initiates &lt;i&gt;payment retry&lt;/i&gt; through the same &lt;i&gt;payment vendor&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer sees a &amp;quot;retrying payment&amp;quot; indicator \u2014 no manual action required during automatic retries&#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 17, &amp;quot;failed payment retries&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;transient error&lt;/i&gt; triggers automatic &lt;i&gt;payment retry&lt;/i&gt; within &lt;i&gt;retry window&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16070\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/retry-failed-payment/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;payment retry&lt;/i&gt; succeeds&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; transitions to confirmed as if the first attempt had succeeded&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer sees the order confirmation page and receives the &lt;i&gt;confirmation email&lt;/i&gt;&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;payment retry&lt;/i&gt; success confirms the &lt;i&gt;order&lt;/i&gt; and fires &lt;i&gt;confirmation email&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16070\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/retry-failed-payment/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;payment retry&lt;/i&gt; fails again within the &lt;i&gt;retry window&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system retries up to the configured maximum attempt count&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; after the final retry fails, the customer is notified that the &lt;i&gt;payment&lt;/i&gt; could not be processed&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;payment method selector&lt;/i&gt; displays all vendor options and manual card entry&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;payment retry&lt;/i&gt; runs automatically up to configured maximum within &lt;i&gt;retry window&lt;/i&gt;; exhaustion returns &lt;i&gt;payment method selector&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16070\" y=\"513\" width=\"250\" height=\"90\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/retry-failed-payment/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a &lt;i&gt;payment&lt;/i&gt; fails due to a &lt;i&gt;hard decline&lt;/i&gt; (insufficient funds, card blocked, fraud flag, BNPL eligibility failure)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system does not automatically initiate &lt;i&gt;payment retry&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer is immediately shown the decline reason and offered alternative &lt;i&gt;payment vendor&lt;/i&gt; options at the &lt;i&gt;payment method selector&lt;/i&gt;&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;hard decline&lt;/i&gt; must not trigger automatic &lt;i&gt;payment retry&lt;/i&gt;; &lt;i&gt;payment retry&lt;/i&gt; invariant: must never retry a &lt;i&gt;hard decline&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16070\" y=\"613\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/process-payment/retry-failed-payment/ac-4\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a &lt;i&gt;payment retry&lt;/i&gt; is in progress and the customer navigates away from checkout&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;payment retry&lt;/i&gt; continues in the background&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; if it succeeds, the &lt;i&gt;order&lt;/i&gt; is confirmed and the &lt;i&gt;confirmation email&lt;/i&gt; fires&#10;   &lt;b&gt;BUT&lt;/b&gt; if all retries exhaust within the &lt;i&gt;retry window&lt;/i&gt;, the &lt;i&gt;order&lt;/i&gt; remains unpaid and the customer is notified via guest email or account notification&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;payment retry&lt;/i&gt; continues in the background when the customer navigates away\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16070\" y=\"700\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order\" value=\"Fulfill Order\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16335\" y=\"195\" width=\"1040\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/confirm-order-and-send-confirmation-email\" value=\"Confirm Order and Send Confirmation Email\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16340\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/confirm-order-and-send-confirmation-email/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;payment confirmation&lt;/i&gt; succeeds (see &lt;i&gt;Process Card Payment via StripeWave&lt;/i&gt;)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system displays the &lt;i&gt;order confirmation page&lt;/i&gt; with &lt;i&gt;order&lt;/i&gt; number, &lt;i&gt;order line item&lt;/i&gt; list, total, and &lt;i&gt;pickup store&lt;/i&gt; details&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the system sends a &lt;i&gt;confirmation email&lt;/i&gt; to the &lt;i&gt;guest email&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 19, &amp;quot;Order confirmation page, confirmation email&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;order confirmation page&lt;/i&gt;, &lt;i&gt;confirmation email&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16340\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/confirm-order-and-send-confirmation-email/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;confirmation email&lt;/i&gt; is sent&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; it includes: &lt;i&gt;order&lt;/i&gt; number, &lt;i&gt;order line item&lt;/i&gt; list, total paid, masked &lt;i&gt;payment&lt;/i&gt; method, and &lt;i&gt;pickup store&lt;/i&gt; &lt;i&gt;address&lt;/i&gt; with &lt;i&gt;operating hours&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;confirmation email&lt;/i&gt; includes pickup details; requirements-chat-with-product-owner.md \u2014 line 19\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16340\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/confirm-order-and-send-confirmation-email/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the email delivery system is temporarily unavailable&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order confirmation page&lt;/i&gt; still displays to the customer (the &lt;i&gt;order&lt;/i&gt; is not blocked by email failure)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;confirmation email&lt;/i&gt; is queued for retry  &#10;   &lt;b&gt;BUT&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; is not rolled back due to email failure  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;confirmation email&lt;/i&gt; invariant: must not block &lt;i&gt;order&lt;/i&gt; confirmation when delivery fails\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16340\" y=\"500\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/send-shipping-notification-with-tracking-number\" value=\"Send Shipping Notification with Tracking Number\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16600\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/send-shipping-notification-with-tracking-number/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; enters a &lt;i&gt;tracking number&lt;/i&gt; and confirms &lt;i&gt;ship-to-home fulfillment&lt;/i&gt; dispatch&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system sends a &lt;i&gt;shipping notification&lt;/i&gt; to the &lt;i&gt;guest email&lt;/i&gt; on the &lt;i&gt;order&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the notification includes: &lt;i&gt;order&lt;/i&gt; number, &lt;i&gt;order line item&lt;/i&gt; shipped, carrier name, &lt;i&gt;tracking number&lt;/i&gt;, and estimated delivery window  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 19, &amp;quot;shipping notifications with tracking numbers. The usual stuff but done well.&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;shipping notification&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16600\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/send-shipping-notification-with-tracking-number/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;shipping notification&lt;/i&gt; is sent&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order status&lt;/i&gt; transitions from fulfilled to shipped  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;tracking number&lt;/i&gt; transitions &lt;i&gt;order status&lt;/i&gt; from fulfilled to shipped when dispatch is confirmed\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16600\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/send-shipping-notification-with-tracking-number/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the email delivery system is temporarily unavailable&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;shipping notification&lt;/i&gt; is queued for retry&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;order status&lt;/i&gt; still transitions to shipped (email failure does not block fulfillment)  &#10;   &lt;b&gt;BUT&lt;/b&gt; the customer may not receive the notification immediately \u2014 a retry window applies  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;shipping notification&lt;/i&gt; invariant: must not block &lt;i&gt;order status&lt;/i&gt; transition when delivery fails; same resilience pattern as &lt;i&gt;confirmation email&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16600\" y=\"500\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/send-shipping-notification-with-tracking-number/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; did not enter a &lt;i&gt;tracking number&lt;/i&gt; at fulfillment (see &lt;i&gt;View and Process Incoming Orders&lt;/i&gt; AC 4)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; no &lt;i&gt;shipping notification&lt;/i&gt; is sent automatically&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the order detail provides an &amp;quot;Add Tracking Number&amp;quot; field so the notification fires when the &lt;i&gt;store employee&lt;/i&gt; enters a &lt;i&gt;tracking number&lt;/i&gt; later  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;shipping notification&lt;/i&gt; does not fire without a &lt;i&gt;tracking number&lt;/i&gt;; staff may add tracking later\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16600\" y=\"587\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/fulfill-click-and-collect-order\" value=\"Fulfill Click-and-Collect Order\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16860\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/fulfill-click-and-collect-order/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer arrives and the &lt;i&gt;store employee&lt;/i&gt; confirms the handoff&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; marks the &lt;i&gt;order&lt;/i&gt; as collected&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; status transitions from ready for pickup to collected  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;pickup fulfillment&lt;/i&gt; transitions &lt;i&gt;order&lt;/i&gt; from ready for pickup to collected at the &lt;i&gt;pickup store&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16860\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/fulfill-click-and-collect-order/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer does not pick up the &lt;i&gt;order&lt;/i&gt; within a reasonable window&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; remains in ready for pickup status on the staff dashboard&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer&amp;#x27;s &lt;i&gt;guest email&lt;/i&gt; is shown on the &lt;i&gt;order&lt;/i&gt; detail for staff to reach out  &#10;   &lt;b&gt;BUT&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; is not auto-cancelled \u2014 staff handle uncollected orders manually in Increment 2  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 context gap: pickup notification, window, and ID-check process not specified in source\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16860\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/fulfill-click-and-collect-order/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; fulfills the last pending &lt;i&gt;order&lt;/i&gt; in the &lt;i&gt;click-and-collect queue&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;click-and-collect queue&lt;/i&gt; shows an empty state (all orders collected)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard queue behavior\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"16860\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/track-order-status\" value=\"Track Order Status\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17120\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/track-order-status/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a guest customer follows the &lt;i&gt;order&lt;/i&gt; link in their &lt;i&gt;confirmation email&lt;/i&gt; or &lt;i&gt;shipping notification&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order status page&lt;/i&gt; shows the current &lt;i&gt;order status&lt;/i&gt;, itemized &lt;i&gt;order line item&lt;/i&gt; contents, and delivery details  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 19, &amp;quot;Order confirmation page, confirmation email, shipping notifications with tracking numbers&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;order status page&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17120\" y=\"339\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/track-order-status/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; has a &lt;i&gt;tracking number&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order status page&lt;/i&gt; displays the &lt;i&gt;tracking number&lt;/i&gt; and links to the carrier&amp;#x27;s tracking page&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the shipment date and estimated delivery date are displayed  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;order status page&lt;/i&gt; displays &lt;i&gt;tracking number&lt;/i&gt; with carrier link when &lt;i&gt;order status&lt;/i&gt; is shipped or delivered\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17120\" y=\"413\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/track-order-status/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the guest customer enters their &lt;i&gt;order&lt;/i&gt; number and &lt;i&gt;guest email&lt;/i&gt; on a lookup page&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system retrieves and displays the matching &lt;i&gt;order status page&lt;/i&gt;  &#10;   &lt;b&gt;BUT&lt;/b&gt; the lookup fails with a clear error if the &lt;i&gt;guest email&lt;/i&gt; does not match the &lt;i&gt;order&lt;/i&gt; \u2014 no &lt;i&gt;order&lt;/i&gt; details leak to unrelated emails  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;order status page&lt;/i&gt; invariant: guest lookup must match both &lt;i&gt;order&lt;/i&gt; number and &lt;i&gt;guest email&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17120\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/track-order-status/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; has not yet shipped (&lt;i&gt;order status&lt;/i&gt; is confirmed or fulfilled)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order status page&lt;/i&gt; shows the current state without a &lt;i&gt;tracking number&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the page indicates that tracking will be available once the &lt;i&gt;order&lt;/i&gt; ships  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;order status page&lt;/i&gt; indicates tracking will be available once the &lt;i&gt;order&lt;/i&gt; ships when &lt;i&gt;order status&lt;/i&gt; is confirmed or fulfilled\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17120\" y=\"574\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"purchase-products/fulfill-order/track-order-status/ac-4\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;order status&lt;/i&gt; changes (e.g. from shipped to delivered)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order status page&lt;/i&gt; reflects the updated state on the customer&amp;#x27;s next visit  &#10;   &lt;b&gt;BUT&lt;/b&gt; no push notification is sent for status changes in Increment 3 \u2014 the customer must check the page or wait for the &lt;i&gt;shipping notification&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;order status&lt;/i&gt; updates without push notification for intermediate changes in Increment 3; thin-slicing.md \u2014 minimal notification infrastructure in Increment 3\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17120\" y=\"661\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products\" value=\"Return Products\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#e1d5e7;strokeColor=#9673a6;fontColor=#000000;fontSize=11;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17390\" y=\"120\" width=\"1320\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return\" value=\"Initiate Return\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17395\" y=\"195\" width=\"520\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return/initiate-return-from-order-history\" value=\"Initiate Return from Order History\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17400\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return/initiate-return-from-order-history/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer selects &amp;quot;Return&amp;quot; on an eligible order in &lt;i&gt;Order History&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system shows which items in the order are &lt;i&gt;Return Eligible&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer selects the items and quantities to return, plus a return reason&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 21, &amp;quot;Easy returns \u2014 people should be able to initiate a return from their order history&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17400\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return/initiate-return-from-order-history/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer submits the &lt;i&gt;Return Request&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system creates the return record, links it to the original order, and shows the next steps (label generation)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the return status appears in the customer&amp;#x27;s account under the order detail&#10;&lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Order KA, `return` concept: &amp;quot;placed by the customer from order history&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17400\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return/initiate-return-from-order-history/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the order is outside the return window or items are not eligible&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &amp;quot;Return&amp;quot; action is hidden or disabled with a clear reason (e.g. &amp;quot;return window expired&amp;quot;)&#10;&lt;b&gt;BUT&lt;/b&gt; the order detail is still viewable&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 return eligibility gate; specific window rules are a configuration\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17400\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return/initiate-return-from-order-history/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer has already initiated a return for some items in the order&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; those items are shown as &amp;quot;return in progress&amp;quot; and cannot be returned again&#10;&lt;b&gt;BUT&lt;/b&gt; remaining eligible items can still be returned separately&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 partial returns supported; no double-return\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17400\" y=\"587\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return/generate-return-label-or-qr-code\" value=\"Generate Return Label or QR Code\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17660\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return/generate-return-label-or-qr-code/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;Return Request&lt;/i&gt; is submitted&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system generates a &lt;i&gt;Return Label&lt;/i&gt; (PDF) and a &lt;i&gt;Return QR Code&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; both are shown on the return confirmation page and emailed to the customer&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 21, &amp;quot;generate a return label, maybe a QR code they can show at a drop-off point&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17660\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return/generate-return-label-or-qr-code/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer downloads the &lt;i&gt;Return Label&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the label includes: return address, order number, return reference, and carrier barcode&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard return label contents\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17660\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/initiate-return/generate-return-label-or-qr-code/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer chooses the &lt;i&gt;Return QR Code&lt;/i&gt; option&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the QR code is displayable on a mobile device at a carrier drop-off point&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; it encodes the same return reference as ncrement 5\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"17930\" y=\"674\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/track-refund-status\" value=\"Track Refund Status\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18190\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/track-refund-status/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer views the &lt;i&gt;Order Detail&lt;/i&gt; for a returned order&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Refund Status&lt;/i&gt; is visible: processing, completed, or requires review&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 21, &amp;quot;track the refund status&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18190\" y=\"339\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/track-refund-status/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;Refund&lt;/i&gt; is completed by the vendor&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Refund Status&lt;/i&gt; transitions to &lt;i&gt;Completed&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer receives a &amp;quot;refund completed&amp;quot; notification (email)&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 refund lifecycle notification\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18190\" y=\"413\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/track-refund-status/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;Refund Status&lt;/i&gt; is &amp;quot;processing&amp;quot; for an extended period&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Order Detail&lt;/i&gt; shows a note: &amp;quot;refunds typically take X business days depending on your payment provider&amp;quot;&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 expectation management; refund speed depends on the vendor\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18190\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/track-refund-status/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;Refund Status&lt;/i&gt; is &amp;quot;requires review&amp;quot;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the customer sees a message to contact support&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the support team has access to the return and refund details&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 manual escalation path\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18190\" y=\"574\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/process-in-store-return\" value=\"Process In-Store Return\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18450\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/process-in-store-return/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a customer brings an item to the store for return&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the staff dashboard provides an order lookup by order number or customer email&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; a &amp;quot;Start Return&amp;quot; action is displayed on the matched order&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 21, &amp;quot;If they bring something back to the store, that should be reflected in the customer&amp;#x27;s account too&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18450\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/process-in-store-return/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Staff&lt;/i&gt; submits the &lt;i&gt;In-Store Return&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system creates a return record linked to the original order&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; triggers the &lt;i&gt;Refund&lt;/i&gt; through the &lt;i&gt;Original Payment Vendor&lt;/i&gt; (same routing invariant as online returns)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the return appears in the customer&amp;#x27;s &lt;i&gt;Order History&lt;/i&gt;&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 21, &amp;quot;reflected in the customer&amp;#x27;s account&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18450\" y=\"426\" width=\"250\" height=\"90\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/process-in-store-return/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the original order was placed by a guest (no account)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the order lookup and return flow work identically using the order number and guest email&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the refund routes through the original vendor&#10;&lt;b&gt;BUT&lt;/b&gt; the return is not visible in an &amp;quot;account&amp;quot; because the customer has no account&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 guest returns are valid; refund routing is order-level, not account-level\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18450\" y=\"526\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"return-products/process-refund/process-in-store-return/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the item is not eligible for return (outside window, wrong condition)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the staff dashboard shows the ineligibility reason&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; a &amp;quot;Manager Override&amp;quot; action is displayed, requiring manager approval before the return proceeds&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 in-store staff have discretion with approval; online flow does not offer overrides\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18450\" y=\"613\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications\" value=\"Manage Notifications\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#e1d5e7;strokeColor=#9673a6;fontColor=#000000;fontSize=1  value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer has disabled order-related notifications in &lt;i&gt;Notification Preferences&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Order Confirmation Notification&lt;/i&gt; is still sent \u2014 it is a mandatory transactional notification&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 order confirmation cannot be suppressed\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18730\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-order-confirmation/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the email delivery system is unavailable&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the notification is queued for retry&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 same resilience pattern\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18730\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-shipping-update-with-tracking\" value=\"Send Shipping Update with Tracking\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"18990\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-shipping-update-with-tracking/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the order status changes to &lt;i&gt;Shipped&lt;/i&gt; and a &lt;i&gt;Tracking Number&lt;/i&gt; is available&lt; style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"19250\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-appointment-reminder/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the pet has been marked &lt;i&gt;Adopted&lt;/i&gt; before the reminder trigger time&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Appointment Reminder&lt;/i&gt; is suppressed&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;Pet Adopted Before Visit Notification&lt;/i&gt; takes precedence (if not already sent)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Notification KA, `pet-adopted-before-visit alert` decision\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"19250\" y=\"500\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-appointment-reminder/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the email delivery system is temporarily unavailable&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the reminder is queued for retry within a reasonable window before the appointment  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 same email resilience pattern\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"19250\" y=\"587\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-pet-adopted-before-visit-notification\" value=\"Send Pet Adopted Before Visit Notification\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"19510\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-pet-adopted-before-visit-notification/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a pet is marked as &lt;i&gt;Adopted&lt;/i&gt; (see &lt;i&gt;Mark Pet as Adopted&lt;/i&gt;) and there are pending &lt;i&gt;Appointments&lt;/i&gt; for that pet&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system sends a &lt;i&gt;Pet Adopted Before Visit Notification&lt;/i&gt; to each affected customer&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the notification includes: pet name, adoption status, and options to cancel or browse other pets  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Notification KA, `pet-adopted-before-visit alert` decision: &amp;quot;if a pet is adopted while a customer has a pending visit appointment, notify the customer; let them cancel or rebook&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"19510\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-pet-adopted-before-visit-notification/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the notification is sent&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; it is recorded against the appointment and the notification status is visible on the staff&amp;#x27;s &lt;i&gt;Incoming Appointments&lt;/i&gt; view  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 staff visibility into notification status (see &lt;i&gt;View Incoming Appointments&lt;/i&gt; AC 2)\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"19510\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-pet-adopted-before-visit-notification/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the pet is adopted but no pending appointments exist&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; no notification is sent  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 notification is appointment-dependent\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"19510\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-pet-adopted-before-visit-notification/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the email delivery system is temporarily unavailable&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the notification is queued for retry&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the appointment still shows the &amp;quot;pet adopted&amp;quot; badge on both customer and staff views  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 email failure does not suppress the status badge\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"19510\" y=\"574\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/send-transactional-notifications/send-return-and-refund-status-update\" value=\"Send Return and Refund Status Update\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;
