ace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"21930\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/manage-notification-preferences/unsubscribe-from-marketing-emails/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer unsubscribes via the &lt;i&gt;Communication Preferences&lt;/i&gt; page&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the change takes effect immediately&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; no further marketing emails of that category are sent&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 preference page and email link produce the same effect\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"21930\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-notifications/manage-notification-preferences/unsubscribe-from-marketing-emails/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer unsubscribes from all marketing categories&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; transactional notifications (order confirmations, shipping, appointments) are unaffected&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 marketing opt-out does not suppress operational emails\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"21930\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"publish-content\" value=\"Publish Content\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#e1d5e7;strokeColor=#9673a6;fontColor=#000000;fontSize=11;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22200\" y=\"120\" width=\"100\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations\" value=\"Manage Store Operations\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#e1d5e7;strokeColor=#9673a6;fontColor=#000000;fontSize=11;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22310\" y=\"120\" width=\"1060\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory\" value=\"Manage Inventory\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22315\" y=\"195\" width=\"520\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/update-product-stock-levels\" value=\"Update Product Stock Levels\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22320\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/update-product-stock-levels/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;store employee&lt;/i&gt; opens the &lt;i&gt;admin dashboard&lt;/i&gt; for a &lt;i&gt;product&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system displays the current &lt;i&gt;stock level&lt;/i&gt; for that product at the selected &lt;i&gt;store&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; an editable stock quantity field is displayed&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 29, &amp;quot;store staff need a dashboard to manage inventory&amp;quot;; thin-slicing.md \u2014 Increment 1, &amp;quot;Manual stock updates by staff via a bare-bones admin form&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22320\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/update-product-stock-levels/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;store employee&lt;/i&gt; submits an updated stock quantity&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system saves the new &lt;i&gt;stock level&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;stock availability&lt;/i&gt; shown to customers reflects the change&#10;&lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Product Catalog &amp;gt; stock availability, &amp;quot;reflects in real time&amp;quot;; thin-slicing.md \u2014 Increment 1, &amp;quot;Manual stock updates by staff&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22320\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/update-product-stock-levels/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;store employee&lt;/i&gt; enters an invalid stock value (negative number or non-numeric input)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system rejects the update with a clear error message&#10;&lt;b&gt;BUT&lt;/b&gt; the previous &lt;i&gt;stock level&lt;/i&gt; remain unchanged&#10;&lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Product Catalog &amp;gt; stock availability invariant, &amp;quot;must be current&amp;quot; (invalid state must not corrupt stock truth); inferred from standard input validation \u2014 flagged as assumption\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22320\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/update-product-stock-levels/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;store employee&lt;/i&gt; updates stock for a &lt;i&gt;product&lt;/i&gt; at one &lt;i&gt;store&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; only that store&amp;#x27;s &lt;i&gt;stock level&lt;/i&gt; for that product are changed&#10;&lt;b&gt;BUT&lt;/b&gt; other stores&amp;#x27; stock for the same product remains unaffected&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 9, &amp;quot;multiple physical stores&amp;quot;; thin-slicing.md \u2014 Increment 1, &amp;quot;stock availability for a product at that store&amp;quot; (per-store granularity)\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22320\" y=\"587\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/view-inventory-dashboard\" value=\"View Inventory Dashboard\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22580\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/view-inventory-dashboard/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Staff&lt;/i&gt; opens the &lt;i&gt;Inventory Dashboard&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; all products at their store are listed with current &lt;i&gt;Stock Levels&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the dashboard supports search, sort (by name, stock level, category), and filter&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 29, &amp;quot;store staff need a dashboard to manage inventory&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22580\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/view-inventory-dashboard/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a product&amp;#x27;s &lt;i&gt;Stock Level&lt;/i&gt; falls below a configurable threshold&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; a &lt;i&gt;Low Stock Alert&lt;/i&gt; badge is shown on that product&amp;#x27;s row&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; a &amp;quot;Low stock only&amp;quot; filter is available on the dashboard&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 proactive stock management\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22580\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/view-inventory-dashboard/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Staff&lt;/i&gt; edits a &lt;i&gt;Stock Level&lt;/i&gt; from the dashboard&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the same behavior as &lt;i&gt;Update Product Stock Levels&lt;/i&gt; (Increment 1) applies: immediate persist, real-time customer-facing update, validation&#10;&lt;b&gt;Evidence:&lt;/b&gt; established in Increment 1 \u2014 Update Product Stock Levels AC\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22580\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/view-inventory-dashboard/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Staff&lt;/i&gt; views the dashboard for the first time after Increment 9 deployment&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Inventory Dashboard&lt;/i&gt; replaces the bare-bones &lt;i&gt;Admin Stock Form&lt;/i&gt; from Increment 1&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; all existing stock data is intact \u2014 no data migration loss&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 upgrade path from simple form to full dashboard\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22580\" y=\"587\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-inventory/view-inventory-dashboard/ac-4\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Staff&lt;/i&gt; exports inventory data (e.g. CSV)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the export includes: product name, category, current stock level, and last updated timestamp&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the export covers the staff member&amp;#x27;s store only&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 reporting and offline analysis capability\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22580\" y=\"674\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment\" value=\"Manage Order Fulfillment\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22845\" y=\"195\" width=\"520\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment/view-and-process-incoming-orders\" value=\"View and Process Incoming Orders\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22850\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment/view-and-process-incoming-orders/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; opens the &lt;i&gt;order queue&lt;/i&gt; on the &lt;i&gt;admin dashboard&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; they see all confirmed &lt;i&gt;order&lt;/i&gt; across &lt;i&gt;standard delivery&lt;/i&gt; and &lt;i&gt;click-and-collect&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; each &lt;i&gt;order&lt;/i&gt; shows: &lt;i&gt;order&lt;/i&gt; number, &lt;i&gt;order line item&lt;/i&gt; details, delivery type label, and customer name or &lt;i&gt;guest email&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 29, &amp;quot;store staff need a dashboard... handle order fulfilment&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;order queue&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22850\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment/view-and-process-incoming-orders/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; selects a ship-to-home &lt;i&gt;order&lt;/i&gt; (&lt;i&gt;standard delivery&lt;/i&gt;) from the &lt;i&gt;order queue&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the order detail shows the &lt;i&gt;shipping address&lt;/i&gt;, &lt;i&gt;order line item&lt;/i&gt; to pack, and any special notes&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; a &amp;quot;Mark as Fulfilled&amp;quot; action is displayed on the order detail  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;ship-to-home fulfillment&lt;/i&gt; shows &lt;i&gt;shipping address&lt;/i&gt; and items to pack; &lt;i&gt;order&lt;/i&gt; ship-to-home lifecycle: confirmed \u2192 fulfilled \u2192 shipped \u2192 delivered\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22850\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment/view-and-process-incoming-orders/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; marks a ship-to-home &lt;i&gt;order&lt;/i&gt; as fulfilled through &lt;i&gt;ship-to-home fulfillment&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system prompts for a &lt;i&gt;tracking number&lt;/i&gt; (manual entry in Increment 3)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; entering the &lt;i&gt;tracking number&lt;/i&gt; triggers the &lt;i&gt;shipping notification&lt;/i&gt; (see &lt;i&gt;Send Shipping Notification with Tracking Number&lt;/i&gt;)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 19, &amp;quot;shipping notifications with tracking numbers&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;tracking number&lt;/i&gt; at &lt;i&gt;ship-to-home fulfillment&lt;/i&gt; time\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22850\" y=\"513\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment/view-and-process-incoming-orders/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; marks a ship-to-home &lt;i&gt;order&lt;/i&gt; as fulfilled without entering a &lt;i&gt;tracking number&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system warns that the customer will not receive a &lt;i&gt;shipping notification&lt;/i&gt;  &#10;   &lt;b&gt;BUT&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; can still be marked fulfilled \u2014 the &lt;i&gt;tracking number&lt;/i&gt; is recommended but not blocking in Increment 3  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;tracking number&lt;/i&gt; recommended but not blocking; manual label creation per thin-slicing.md Increment 3\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"22850\" y=\"600\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment/prepare-click-and-collect-orders-for-pickup\" value=\"Prepare Click-and-Collect Orders for Pickup\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"23110\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment/prepare-click-and-collect-orders-for-pickup/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; opens the &lt;i&gt;click-and-collect queue&lt;/i&gt; for their &lt;i&gt;pickup store&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; they see all confirmed &lt;i&gt;order&lt;/i&gt; pending &lt;i&gt;pickup fulfillment&lt;/i&gt;, sorted oldest first&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; each &lt;i&gt;order&lt;/i&gt; shows the &lt;i&gt;order&lt;/i&gt; number, &lt;i&gt;order line item&lt;/i&gt; details, and &lt;i&gt;guest email&lt;/i&gt; or customer name  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 29, &amp;quot;handle order fulfilment for click-and-collect if we offer that&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;click-and-collect queue&lt;/i&gt;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"23110\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment/prepare-click-and-collect-orders-for-pickup/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; marks an &lt;i&gt;order&lt;/i&gt; as prepared (items gathered and ready for customer)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; status transitions from confirmed to ready for pickup  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;pickup fulfillment&lt;/i&gt; transitions &lt;i&gt;order&lt;/i&gt; from confirmed to ready for pickup\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"23110\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-store-operations/manage-order-fulfillment/prepare-click-and-collect-orders-for-pickup/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; an &lt;i&gt;order&lt;/i&gt; in the &lt;i&gt;click-and-collect queue&lt;/i&gt; contains a &lt;i&gt;product&lt;/i&gt; that is now out of stock at the &lt;i&gt;pickup store&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;store employee&lt;/i&gt; sees a stock warning on that &lt;i&gt;order line item&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer&amp;#x27;s &lt;i&gt;guest email&lt;/i&gt; is displayed so staff may contact them to resolve (substitute, partial fulfillment, or cancel)  &#10;   &lt;b&gt;BUT&lt;/b&gt; the &lt;i&gt;order&lt;/i&gt; is not auto-cancelled \u2014 staff handle it manually in Increment 2  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;pickup fulfillment&lt;/i&gt; shows &lt;i&gt;guest email&lt;/i&gt; on the queue for staff outreach\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"23110\" y=\"500\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n            </root>\n        </mxGraphModel>\n    </diagram>\n</mxfile>"}'></div><script src='https://viewer.diagrams.net/js/viewer-static.min.js'></script></body></html>
