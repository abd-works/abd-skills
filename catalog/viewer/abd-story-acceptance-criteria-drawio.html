<!DOCTYPE html><html><head><meta charset='utf-8'><style>* {margin:0;padding:0;box-sizing:border-box} body {background:#fff;overflow:hidden}</style></head><body><div class='mxgraph' style='width:100vw;height:100vh;' data-mxgraph='{"highlight": "#0000ff", "nav": false, "resize": true, "fit": true, "xml": "<mxfile host=\"65bd71144e\">\n    <diagram name=\"Story Map\" id=\"story-map\">\n        <mxGraphModel dx=\"2593\" dy=\"1487\" grid=\"1\" gridSize=\"10\" guides=\"1\" tooltips=\"1\" connect=\"1\" arrows=\"1\" fold=\"1\" page=\"1\" pageScale=\"1\" pageWidth=\"1019\" pageHeight=\"542\" math=\"0\" shadow=\"0\">\n            <root>\n                <mxCell id=\"0\"/>\n                <mxCell id=\"1\" parent=\"0\"/>\n                <mxCell id=\"browse-product-catalog\" value=\"Browse Product Catalog\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#e1d5e7;strokeColor=#9673a6;fontColor=#000000;fontSize=11;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"20\" y=\"120\" width=\"1910\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products\" value=\"Search and Filter Products\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"25\" y=\"195\" width=\"840\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/search-products-by-keyword\" value=\"Search Products by Keyword\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"30\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/search-products-by-keyword/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer enters a keyword in the &lt;i&gt;Search Bar&lt;/i&gt; and submits&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Search Results&lt;/i&gt; show products whose name, description, category, or brand match the keyword&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; results are ranked by relevance (closest match first)&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 3, &amp;quot;We want good filtering and search&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"30\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/search-products-by-keyword/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the keyword matches no products&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Search Results&lt;/i&gt; show a &amp;quot;no results found&amp;quot; message with suggestions (e.g. &amp;quot;try a different keyword&amp;quot; or popular categories)&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard search empty state\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"30\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/search-products-by-keyword/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer enters a partial keyword (e.g. &amp;quot;kitt&amp;quot; for &amp;quot;kitten food&amp;quot;)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the search returns relevant matches (prefix matching or fuzzy matching)&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 search should be forgiving of partial input\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"30\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/search-products-by-keyword/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer searches from any page (product detail, pet gallery, blog)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Search Bar&lt;/i&gt; is accessible globally (e.g. in the header)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; results navigate to the search results page&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 search is a global capability, not scoped to one page\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"30\" y=\"574\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/filter-products\" value=\"Filter Products\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"290\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/filter-products/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer is browsing the &lt;i&gt;Product Catalog&lt;/i&gt; or viewing &lt;i&gt;Search Results&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; &lt;i&gt;Filter Facets&lt;/i&gt; are available: category, pet type, brand, price range, and &lt;i&gt;Stock Availability&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; each facet shows the count of matching products&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 3, &amp;quot;browse by category, by pet type, by brand, whatever makes sense. We want good filtering and search&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"290\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/filter-products/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer selects a filter&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the product list updates immediately to show only matching products&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;Active Filters&lt;/i&gt; are shown as removable chips or tags&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard faceted filter behavior\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"290\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/filter-products/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer combines multiple filters (e.g. pet type = &amp;quot;dog&amp;quot; AND category = &amp;quot;food&amp;quot;)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the results narrow to the intersection of all active filters&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; facets update their counts to reflect the combined filter state&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 conjunctive filtering\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"290\" y=\"513\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/filter-products/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer removes an &lt;i&gt;Active Filter&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the product list expands to include products that were previously hidden by that filter&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 filter removal restores results\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"290\" y=\"600\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/filter-products/ac-4\" value=\"&lt;b&gt;WHEN&lt;/b&gt; all active filters produce zero results&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the product list shows a &amp;quot;no products match your filters&amp;quot; message with a &amp;quot;clear all filters&amp;quot; action&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 zero-results state for over-filtered catalog\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"290\" y=\"674\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/display-real-time-stock-availability\" value=\"Display Real-Time Stock Availability\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"550\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/display-real-time-stock-availability/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer views a &lt;i&gt;product page&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system displays current &lt;i&gt;stock availability&lt;/i&gt; for that &lt;i&gt;product&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the availability reflects the most recent &lt;i&gt;stock level&lt;/i&gt; (&lt;i&gt;real-time&lt;/i&gt;)&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 5, &amp;quot;Products should show stock availability in real time&amp;quot;; domain-sketch.md \u2014 Product Catalog &amp;gt; stock availability, &amp;quot;reflects in real time whether a product can be purchased&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"550\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/display-real-time-stock-availability/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;product&lt;/i&gt; is in stock at one or more stores&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system indicates which &lt;i&gt;store&lt;/i&gt; or stores have it available&#10;&lt;b&gt;Evidence:&lt;/b&gt; thin-slicing.md \u2014 Increment 1, &amp;quot;see real-time stock availability for a product at that store&amp;quot;; requirements-chat-with-product-owner.md \u2014 line 9, &amp;quot;they should see which store that animal is at&amp;quot; (same per-store pattern applied to products)\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"550\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/display-real-time-stock-availability/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;product&lt;/i&gt; is out of stock at all stores&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system clearly indicates the product is currently unavailable&#10;&lt;b&gt;BUT&lt;/b&gt; no backorder, pre-order, or purchase option is offered&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 5, &amp;quot;nobody wants to go through checkout and find out the item&amp;#x27;s backordered&amp;quot;; thin-slicing.md \u2014 Increment 1, &amp;quot;No cart, no checkout&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"550\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/display-real-time-stock-availability/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;stock level&lt;/i&gt; are updated by staff&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; subsequent customer views of the &lt;i&gt;product page&lt;/i&gt; reflect the updated &lt;i&gt;stock availability&lt;/i&gt;&#10;&lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Product Catalog &amp;gt; stock availability, &amp;quot;must be current \u2014 stale availability that allows checkout of unavailable items is a domain failure&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"550\" y=\"574\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/search-and-filter-products/display-low-stock-badge\" value=\"Display Low Stock Badge\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"810\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details\" value=\"View Product Details\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"875\" y=\"195\" width=\"520\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/view-product-details\" value=\"View Product Details\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"880\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/view-product-details/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer selects a &lt;i&gt;product&lt;/i&gt; from the &lt;i&gt;product catalog&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system displays the &lt;i&gt;product page&lt;/i&gt; with the product name, &lt;i&gt;description&lt;/i&gt;, and &lt;i&gt;product images&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; &lt;i&gt;weight and dimensions&lt;/i&gt; are shown where relevant to the product&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 5, &amp;quot;Every product gets images (multiple angles ideally), a proper description, weight and dimensions where relevant&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"880\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/view-product-details/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;product&lt;/i&gt; belongs to one or more categories&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;product page&lt;/i&gt; shows which &lt;i&gt;category&lt;/i&gt; or categories the product belongs to&#10;&lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Product Catalog &amp;gt; product, &amp;quot;belongs to at least one category and may belong to several simultaneously&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"880\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/view-product-details/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the &lt;i&gt;product&lt;/i&gt; has multiple &lt;i&gt;product images&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system displays all available images&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; navigation controls (arrows, thumbnails) are provided to browse between images&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 5, &amp;quot;images (multiple angles ideally)&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"880\" y=\"500\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/view-product-details/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer navigates the &lt;i&gt;product catalog&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; products are organized by &lt;i&gt;category&lt;/i&gt; for browsing&#10;&lt;b&gt;BUT&lt;/b&gt; no keyword search is available in this increment&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 3, &amp;quot;browse by category, by pet type, by brand&amp;quot;; thin-slicing.md \u2014 Increment 1, &amp;quot;Categories only \u2014 no keyword search yet&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"880\" y=\"587\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/view-product-details/ac-4\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer views a &lt;i&gt;product page&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; no purchase, cart, or review actions are available&#10;&lt;b&gt;Evidence:&lt;/b&gt; thin-slicing.md \u2014 Increment 1, &amp;quot;No cart, no checkout, no notifications&amp;quot;; Increment 8 includes reviews\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"880\" y=\"661\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/read-customer-reviews\" value=\"Read Customer Reviews\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"1140\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/read-customer-reviews/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer views a &lt;i&gt;Product Details Page&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Aggregate Star Rating&lt;/i&gt; is displayed prominently near the product name&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the individual &lt;i&gt;Customer Reviews&lt;/i&gt; are listed below the product details&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 23, &amp;quot;Other customers should be able to see them and they should factor into some kind of aggregate star rating on the product&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"1140\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/read-customer-reviews/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a product has no reviews yet&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Aggregate Star Rating&lt;/i&gt; is not shown (not shown as zero)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; a &amp;quot;be the first to review&amp;quot; prompt appears&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 no reviews state\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"1140\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/read-customer-reviews/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; there are many reviews&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the reviews are paginated or lazy-loaded&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; sort controls are provided: newest, oldest, highest rating, lowest rating&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard review list behavior\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"1140\" y=\"513\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/view-product-details/read-customer-reviews/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a review includes &lt;i&gt;Review Photos&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; thumbnails are shown inline with the review text&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; selecting a thumbnail opens the image at full size&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 23, &amp;quot;photo reviews&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"1140\" y=\"600\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/review-products\" value=\"Review Products\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"1405\" y=\"195\" width=\"520\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/review-products/submit-written-review-with-star-rating\" value=\"Submit Written Review with Star Rating\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"1410\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-product-catalog/review-products/submit-written-review-with-star-rating/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a logged-in customer opens the review form on a &lt;i&gt;Product Details Page&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the form collects a &lt;i&gt;Star Rating&lt;/i&gt; (1-5) and a written review (free text)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer must have purchased the product to geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings\" value=\"Manage Pet Listings\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"2735\" y=\"195\" width=\"520\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings/update-pet-profile\" value=\"Update Pet Profile\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"2740\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings/update-pet-profile/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; opens a &lt;i&gt;Pet Profile&lt;/i&gt; for editing&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; all fields are editable: name, species, breed, age, &lt;i&gt;Temperament Notes&lt;/i&gt;, &lt;i&gt;Pet Photo Gallery&lt;/i&gt;, and the store the pet is located at  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 7, &amp;quot;Each pet gets a profile page \u2014 photo gallery, basic info (breed, age, temperament)&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"2740\" y=\"339\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings/update-pet-profile/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; saves changes to a &lt;i&gt;Pet Profile&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the customer-facing &lt;i&gt;Pet Profile Page&lt;/i&gt; reflects the changes immediately  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 admin changes are live on the customer side\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"2740\" y=\"413\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings/update-pet-profile/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; uploads new photos to the &lt;i&gt;Pet Photo Gallery&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the photos are added to the gallery&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; existing photos are not replaced unless explicitly removed  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 additive photo management\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"2740\" y=\"487\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings/update-pet-profile/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; changes the store a pet is located at (pet transferred between stores)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Pet Profile Page&lt;/i&gt; shows the new store&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; any existing appointments for that pet at the old store show a store-change notification to the customer  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 pet relocation affects booked appointments\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"2740\" y=\"574\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings/mark-pet-as-adopted\" value=\"Mark Pet as Adopted\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3000\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings/mark-pet-as-adopted/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; marks a pet as &lt;i&gt;Adopted&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Pet Status&lt;/i&gt; transitions from &lt;i&gt;Available&lt;/i&gt; to &lt;i&gt;Adopted&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &amp;quot;Book a Visit&amp;quot; action is disabled on the &lt;i&gt;Pet Profile Page&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Pet KA, `pet` concept: &amp;quot;status progresses from available to adopted&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3000\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings/mark-pet-as-adopted/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the pet has upcoming appointments at the time of adoption&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system triggers a &lt;i&gt;Pet Adopted Before Visit Notification&lt;/i&gt; for each affected customer (see that story)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Notification KA, `pet-adopted-before-visit alert` decision: &amp;quot;if a pet is adopted while a customer has a pending visit appointment, notify&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3000\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"browse-available-pets/manage-pet-listings/mark-pet-as-adopted/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; attempts to mark an already-adopted pet as adopted again&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system shows a &amp;quot;pet is already adopted&amp;quot; message  &#10;   &lt;b&gt;BUT&lt;/b&gt; no status change occurs  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 idempotent status transition\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3000\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit\" value=\"Book Pet Visit\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#e1d5e7;strokeColor=#9673a6;fontColor=#000000;fontSize=11;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3270\" y=\"120\" width=\"2890\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit\" value=\"Schedule Visit\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3275\" y=\"195\" width=\"1040\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/view-available-time-slots-at-store\" value=\"View Available Time Slots at Store\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3280\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/view-available-time-slots-at-store/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer initiates the appointment booking flow from a pet profile&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Appointment Calendar&lt;/i&gt; shows &lt;i&gt;Available Time Slots&lt;/i&gt; at the pet&amp;#x27;s &lt;i&gt;Store&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; slots are shown for the next N days (configurable by store, e.g. 14 or 30 days)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 7, &amp;quot;book an appointment to visit the pet in-store. They&amp;#x27;d pick a date and time slot&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3280\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/view-available-time-slots-at-store/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a &lt;i&gt;Time Slot&lt;/i&gt; is already booked by another customer&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; that slot does not appear in the &lt;i&gt;Available Time Slots&lt;/i&gt; list  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Pet KA, `time slot` concept: &amp;quot;represents a bookable window at a store for a pet visit&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3280\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/view-available-time-slots-at-store/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; no &lt;i&gt;Time Slots&lt;/i&gt; are available within the displayed date range&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Appointment Calendar&lt;/i&gt; shows a &amp;quot;no slots available \u2014 try a later date&amp;quot; message  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 empty state for calendar\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3280\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/select-date-and-time-slot\" value=\"Select Date and Time Slot\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3540\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/select-date-and-time-slot/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer selects a &lt;i&gt;Time Slot&lt;/i&gt; from the &lt;i&gt;Appointment Calendar&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Selected Slot&lt;/i&gt; is highlighted and held temporarily (e.g. 10 minutes) to prevent double-booking during the booking flow&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer proceeds to the confirmation step  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 7, &amp;quot;pick a date and time slot&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3540\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/select-date-and-time-slot/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the temporary hold expires before the customer confirms&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Selected Slot&lt;/i&gt; is released back to the &lt;i&gt;Available Time Slots&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer is notified that the slot is no longer held and must re-select  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 temporary hold to prevent double-booking without permanent reservation\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3540\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/select-date-and-time-slot/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; two customers select the same &lt;i&gt;Time Slot&lt;/i&gt; simultaneously&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; only the first to confirm gets the booking&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the second customer is notified that the slot is no longer available and must pick another  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Pet KA, `appointment` invariant: &amp;quot;must not overlap with another appointment at the same store for the same time slot&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3540\" y=\"513\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/add-visit-note\" value=\"Add Visit Note\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3800\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/add-visit-note/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer is in the appointment confirmation step&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; an optional &lt;i&gt;Visit Note&lt;/i&gt; field is available&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the field accepts up to a character limit (e.g. 500 characters)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 7, &amp;quot;add a note for the visit&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3800\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/add-visit-note/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer leaves the &lt;i&gt;Visit Note&lt;/i&gt; blank&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the appointment proceeds without a note&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the staff view shows no note (not &amp;quot;empty&amp;quot; or &amp;quot;N/A&amp;quot;)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 optional field handling\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3800\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/add-visit-note/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer submits a &lt;i&gt;Visit Note&lt;/i&gt; that exceeds the character limit&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the form shows a validation error  &#10;   &lt;b&gt;BUT&lt;/b&gt; the appointment is not submitted until the note is within limits  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard text field validation\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"3800\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/confirm-appointment-booking\" value=\"Confirm Appointment Booking\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4060\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/confirm-appointment-booking/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a logged-in customer confirms the appointment&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Appointment Booking&lt;/i&gt; is created with: pet, store, date/time, and optional visit note&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer sees the &lt;i&gt;Appointment Confirmation Page&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; an &lt;i&gt;Appointment Confirmation Email&lt;/i&gt; is sent to the customer&amp;#x27;s email  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 7, &amp;quot;book an appointment to visit the pet in-store&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4060\" y=\"339\" width=\"250\" height=\"90\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/confirm-appointment-booking/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a guest (not logged in) attempts to confirm an appointment&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system blocks the booking and prompts the customer to log in or register&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; explains that appointments require a customer account  &#10;   &lt;b&gt;BUT&lt;/b&gt; the selected slot remains temporarily held so the customer doesn&amp;#x27;t lose it  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Pet KA, `appointment` concept: &amp;quot;booked by exactly one customer account&amp;quot;; thin-slicing.md \u2014 Increment 6 slicing notes: &amp;quot;appointment booking is customer-account-only&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4060\" y=\"439\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/confirm-appointment-booking/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the booking is confirmed&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Time Slot&lt;/i&gt; transitions from available to booked&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the slot is no longer shown to other customers  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Pet KA, `appointment` invariant: &amp;quot;must not overlap with another appointment at the same store for the same time slot&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4060\" y=\"526\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/schedule-visit/confirm-appointment-booking/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the confirmation email fails to send&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the booking is still created (email is not a gate)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the email is queued for retry  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 same email resilience pattern as order confirmation\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4060\" y=\"613\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments\" value=\"Manage Appointments\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4325\" y=\"195\" width=\"780\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/view-upcoming-and-past-appointments\" value=\"View Upcoming and Past Appointments\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4330\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/view-upcoming-and-past-appointments/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer opens their &lt;i&gt;Appointment List&lt;/i&gt; from the account area&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; upcoming appointments are shown first (soonest at top), followed by past appointments&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; each entry shows: pet name, pet photo, store, date/time, and visit note (if any)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 7, &amp;quot;view upcoming and past appointments&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4330\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/view-upcoming-and-past-appointments/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer has no appointments&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the list shows an empty state with a prompt to browse the &lt;i&gt;Pet Gallery&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 empty state handling\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4330\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/view-upcoming-and-past-appointments/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; an upcoming appointment&amp;#x27;s pet has been marked as &lt;i&gt;Adopted&lt;/i&gt; (see &lt;i&gt;Mark Pet as Adopted&lt;/i&gt;)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the appointment entry shows a &amp;quot;pet adopted&amp;quot; badge&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; &amp;quot;Cancel&amp;quot; and &amp;quot;Browse other pets&amp;quot; actions are shown on the entry (see &lt;i&gt;Cancel or Rebook Appointment After Pet Adoption&lt;/i&gt;)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Notification KA, `pet-adopted-before-visit alert` decision\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4330\" y=\"500\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/cancel-or-rebook-appointment-after-pet-adoption\" value=\"Cancel or Rebook Appointment After Pet Adoption\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4590\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/cancel-or-rebook-appointment-after-pet-adoption/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer receives a &lt;i&gt;Pet Adopted Before Visit Notification&lt;/i&gt; (see that story)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the notification includes options to cancel the appointment or browse other available pets to rebook  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Notification KA, `pet-adopted-before-visit alert` decision: &amp;quot;notify the customer; let them cancel or rebook&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4590\" y=\"339\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/cancel-or-rebook-appointment-after-pet-adoption/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer cancels the appointment&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;Time Slot&lt;/i&gt; is released back to available&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the appointment moves to &lt;i&gt;Cancelled&lt;/i&gt; status in the &lt;i&gt;Appointment List&lt;/i&gt;  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 cancellation releases the slot\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4590\" y=\"413\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/cancel-or-rebook-appointment-after-pet-adoption/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer chooses to rebook&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system navigates to the &lt;i&gt;Pet Gallery&lt;/i&gt; with available pets displayed for a new booking&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the original cancelled appointment remains in the &lt;i&gt;Past Appointments&lt;/i&gt; section  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 rebook is a new booking flow, not a slot swap\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4590\" y=\"500\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/cancel-or-rebook-appointment-after-pet-adoption/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer neither cancels nor rebooks before the appointment date&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the appointment remains in the system but staff see a &amp;quot;pet adopted&amp;quot; warning on their incoming appointments view&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the appointment is treated as a no-show after the date passes  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 system does not auto-cancel; staff handle edge case\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4590\" y=\"587\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/view-incoming-appointments\" value=\"View Incoming Appointments\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4850\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/view-incoming-appointments/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; opens the &lt;i&gt;Incoming Appointments&lt;/i&gt; view&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; all booked appointments for their &lt;i&gt;Store&lt;/i&gt; are listed, sorted by date/time (soonest first)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; each entry shows: customer name, pet name, date/time, and visit note (if any)  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 29, &amp;quot;store staff need a dashboard to manage inventory, see incoming appointments&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4850\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/view-incoming-appointments/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; an appointment&amp;#x27;s pet has been marked &lt;i&gt;Adopted&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the entry shows a &amp;quot;pet adopted&amp;quot; warning badge&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the notification status (&amp;quot;notified&amp;quot; or &amp;quot;not yet notified&amp;quot;) is displayed on the entry  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Pet KA, `appointment` concept linked to pet status\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4850\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/manage-appointments/view-incoming-appointments/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; there are no upcoming appointments&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the view shows an empty state  &#10;   &lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard empty state\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"4850\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/track-visit-outcomes\" value=\"Track Visit Outcomes\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"5115\" y=\"195\" width=\"1040\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/track-visit-outcomes/check-in-customer\" value=\"Check In Customer\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"5120\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/track-visit-outcomes/check-in-customer/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; selects &amp;quot;Check In&amp;quot; on an appointment from the &lt;i&gt;Incoming Appointments&lt;/i&gt; view&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system records the &lt;i&gt;Checked-In Time&lt;/i&gt; and the staff member who checked them in&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the appointment status transitions from &lt;i&gt;Confirmed&lt;/i&gt; to &lt;i&gt;Checked In&lt;/i&gt;&#10;&lt;b&gt;Evidence:&lt;/b&gt; crc.md \u2014 Appointment, `checked-in time` and `checked-in by` properties\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"5120\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/track-visit-outcomes/check-in-customer/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer arrives early or late relative to the &lt;i&gt;Time Slot&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; check-in is still allowed \u2014 the &lt;i&gt;Checked-In Time&lt;/i&gt; records the actual arrival, not the slot start&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 real arrival time matters for visit analytics and staff scheduling\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"5120\" y=\"426\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/track-visit-outcomes/check-in-customer/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; attempts to check in an appointment that is already checked in&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system shows &amp;quot;already checked in&amp;quot; with the original &lt;i&gt;Checked-In Time&lt;/i&gt;&#10;&lt;b&gt;BUT&lt;/b&gt; no duplicate check-in is recorded&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 idempotent check-in\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"5120\" y=\"500\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/track-visit-outcomes/check-in-customer/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; attempts to check in a cancelled appointment&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system blocks the check-in with a &amp;quot;this appointment was cancelled&amp;quot; message&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 cancelled appointments cannot transition forward\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"5120\" y=\"574\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/track-visit-outcomes/record-visit-outcome\" value=\"Record Visit Outcome\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"5380\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/track-visit-outcomes/record-visit-outcome/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; selects &amp;quot;Record Outcome&amp;quot; on a checked-in appointment&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system presents outcome options: &lt;i&gt;Adopted&lt;/i&gt;, &lt;i&gt;Interested \u2014 Returning&lt;/i&gt;, &lt;i&gt;Not a Fit&lt;/i&gt;, &lt;i&gt;Browsing Only&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; a &lt;i&gt;Staff Visit Notes&lt;/i&gt; field for observations&#10;&lt;b&gt;Evidence:&lt;/b&gt; crc.md \u2014 Appointment, `visit outcome` and `staff visit notes` properties\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"5380\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"book-pet-visit/track-visit-outcomes/record-visit-outcome/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;Store Employee&lt;/i&gt; selects &lt;i&gt;Adopted&lt;/i&gt; as the outcome&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the appointment is marked as completed with outcome &lt;i&gt;Adopted&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the pet status transitions to &lt;i&gt;Adopted&lt;/i&gt; (triggering the same notifications as &lt;i&gt;Mark Pet as Adopted&lt;/i&gt;)&#10;&lt;b&gt;Evidence:&lt;/b&gt; crc.md \u2                 <mxCell id=\"find-store/locate-stores/filter-stores-by-availability-and-specialization/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer is browsing the &lt;i&gt;Store List&lt;/i&gt; or &lt;i&gt;Store Map&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; filters are available for: &lt;i&gt;Store Specialization&lt;/i&gt; and &lt;i&gt;Product Availability&lt;/i&gt; (e.g. &amp;quot;stores that have product X in stock&amp;quot;)&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 11, &amp;quot;filtering by what&amp;#x27;s available at each location. Some stores might specialise&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"6700\" y=\"339\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/locate-stores/filter-stores-by-availability-and-specialization/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer filters by &lt;i&gt;Store Specialization&lt;/i&gt; (e.g. &amp;quot;reptile section&amp;quot;)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; only stores with that specialization are shown&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 11, &amp;quot;one might have a great reptile section&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"6700\" y=\"413\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/locate-stores/filter-stores-by-availability-and-specialization/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer filters by &lt;i&gt;Product Availability&lt;/i&gt; for a specific product&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; only stores where that product is &lt;i&gt;In Stock&lt;/i&gt; are shown&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 11, &amp;quot;filtering by what&amp;#x27;s available at each location&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"6700\" y=\"487\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/locate-stores/filter-stores-by-availability-and-specialization/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; no stores match the combined filters&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; a &amp;quot;no stores match your filters&amp;quot; message is shown with a &amp;quot;clear filters&amp;quot; action&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 standard zero-results handling\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"6700\" y=\"561\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/locate-stores/calculate-distance-to-store\" value=\"Calculate Distance to Store\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"6960\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/locate-stores/calculate-distance-to-store/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer provides their location (via &lt;i&gt;shared location&lt;/i&gt; or entering a &lt;i&gt;postcode&lt;/i&gt;)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system calculates &lt;i&gt;distance&lt;/i&gt; from the customer to each &lt;i&gt;store&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; stores are sorted &lt;i&gt;nearest-first&lt;/i&gt;&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 9, &amp;quot;how far away it is from them (assuming they share location or enter a postcode)&amp;quot;; domain-sketch.md \u2014 Store &amp;gt; store locator, &amp;quot;calculates distance from the customer&amp;#x27;s shared location or entered postcode, producing a sorted nearest-first result list&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"6960\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/locate-stores/calculate-distance-to-store/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer has not provided any location&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the &lt;i&gt;store locator&lt;/i&gt; displays all stores without &lt;i&gt;distance&lt;/i&gt; information&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; all stores remain browsable in their default order&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 9, conditional phrasing &amp;quot;assuming they share location or enter a postcode&amp;quot; implies location provision is optional\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"6960\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/locate-stores/calculate-distance-to-store/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; &lt;i&gt;distance&lt;/i&gt; has been calculated&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the distance value appears next to each &lt;i&gt;store&lt;/i&gt; in both &lt;i&gt;map view&lt;/i&gt; and &lt;i&gt;list view&lt;/i&gt;&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 9, &amp;quot;how far away it is from them&amp;quot;; line 11, &amp;quot;Map view, list view&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"6960\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/locate-stores/calculate-distance-to-store/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer changes their location input (new &lt;i&gt;postcode&lt;/i&gt; or re-shared location)&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the system recalculates &lt;i&gt;distance&lt;/i&gt; for all stores&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;nearest-first&lt;/i&gt; ordering updates accordingly&#10;&lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Store &amp;gt; store locator, &amp;quot;calculates distance from the customer&amp;#x27;s shared location or entered postcode&amp;quot; (implies recalculation on input change)\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"6960\" y=\"587\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/personalize-store-experience\" value=\"Personalize Store Experience\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7225\" y=\"195\" width=\"520\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/personalize-store-experience/set-my-store-preference\" value=\"Set My Store Preference\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7230\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/personalize-store-experience/set-my-store-preference/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a logged-in customer selects &amp;quot;Set as My Store&amp;quot; on a &lt;i&gt;Store Detail&lt;/i&gt; page or from account settings&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the selected store is saved as the customer&amp;#x27;s &lt;i&gt;My Store&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the preference persists across sessions and devices&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 11, &amp;quot;Maybe even the ability to set &amp;#x27;my store&amp;#x27; as a preference and tailor the experience&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7230\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/personalize-store-experience/set-my-store-preference/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer changes their &lt;i&gt;My Store&lt;/i&gt; preference&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the old preference is replaced with the new one&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the tailored experience (see &lt;i&gt;Tailor Experience to Preferred Store&lt;/i&gt;) reflects the change immediately&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 single preferred store per account\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7230\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/personalize-store-experience/set-my-store-preference/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; a guest customer tries to set &lt;i&gt;My Store&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; a prompt to log in or register is shown&#10;&lt;b&gt;BUT&lt;/b&gt; the store page is not navigated away from&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 preference requires an account for persistence\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7230\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/personalize-store-experience/tailor-experience-to-preferred-store\" value=\"Tailor Experience to Preferred Store\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7490\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/personalize-store-experience/tailor-experience-to-preferred-store/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer has a &lt;i&gt;My Store&lt;/i&gt; set&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; &lt;i&gt;Stock Availability&lt;/i&gt; on product pages defaults to the preferred store&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the &lt;i&gt;Store Locator&lt;/i&gt; highlights the preferred store&#10;&lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 11, &amp;quot;tailor the experience&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7490\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/personalize-store-experience/tailor-experience-to-preferred-store/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer has a &lt;i&gt;My Store&lt;/i&gt; and enters checkout with &lt;i&gt;Click-and-Collect&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the preferred store is pre-selected in the &lt;i&gt;Store Selector&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the full store list remains available for selecting a different store&#10;&lt;b&gt;Evidence:&lt;/b&gt; domain-sketch.md \u2014 Store KA, `store` concept: &amp;quot;tailors the browsing experience when set as the customer&amp;#x27;s preferred store&amp;quot;\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7490\" y=\"426\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"find-store/personalize-store-experience/tailor-experience-to-preferred-store/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer has no &lt;i&gt;My Store&lt;/i&gt; set&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; no store-specific tailoring is applied (default behavior from previous increments)&#10;&lt;b&gt;Evidence:&lt;/b&gt; inferred \u2014 feature is additive, not breaking\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7490\" y=\"513\" width=\"250\" height=\"64\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-customer-account\" value=\"Manage Customer Account\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#e1d5e7;strokeColor=#9673a6;fontColor=#000000;fontSize=11;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7760\" y=\"120\" width=\"4510\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-customer-account/register-and-authenticate\" value=\"Register and Authenticate\" style=\"rounded=1;whiteSpace=wrap;html=1;overflow=hidden;fillColor=#d5e8d4;strokeColor=#82b366;fontColor=#000000;fontSize=10;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7765\" y=\"195\" width=\"1820\" height=\"60\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-customer-account/register-and-authenticate/register-account\" value=\"Register Account\" style=\"whiteSpace=wrap;html=1;overflow=hidden;aspect=fixed;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7770\" y=\"279\" width=\"50\" height=\"50\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-customer-account/register-and-authenticate/register-account/ac-0\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer opens the registration screen&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the form collects email address and password (with confirmation)&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; password requirements are shown clearly before submission&#10;   &lt;b&gt;Evidence:&lt;/b&gt; requirements-chat-with-product-owner.md \u2014 line 15, &amp;quot;registration, login, logout, password reset, email verification&amp;quot;; ubiquitous-language.md \u2014 &lt;i&gt;customer account&lt;/i&gt; registers via email and password\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7770\" y=\"339\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-customer-account/register-and-authenticate/register-account/ac-1\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer submits valid registration details&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; a &lt;i&gt;customer account&lt;/i&gt; is created with &lt;i&gt;account verification status&lt;/i&gt; unverified&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the system triggers &lt;i&gt;Send Email Verification&lt;/i&gt;&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; the customer sees a &amp;quot;check your email to verify&amp;quot; confirmation screen&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;customer account&lt;/i&gt; creates unverified status until &lt;i&gt;email verification&lt;/i&gt; completes; thin-slicing.md \u2014 Increment 4, &lt;i&gt;email verification&lt;/i&gt; mandatory\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7770\" y=\"426\" width=\"250\" height=\"90\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-customer-account/register-and-authenticate/register-account/ac-2\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer submits an email already registered to another &lt;i&gt;customer account&lt;/i&gt;&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the form shows an error stating the email is already in use&lt;br/&gt;&lt;b&gt;AND&lt;/b&gt; a &amp;quot;Log In instead&amp;quot; link is displayed&#10;   &lt;b&gt;BUT&lt;/b&gt; the error does not reveal whether the existing &lt;i&gt;account verification status&lt;/i&gt; is verified or unverified&#10;   &lt;b&gt;Evidence:&lt;/b&gt; ubiquitous-language.md \u2014 &lt;i&gt;customer account&lt;/i&gt; invariant: unique verified email before account-only features unlock\" style=\"whiteSpace=wrap;html=1;overflow=hidden;fillColor=#fff2cc;strokeColor=#d6b656;fontColor=#000000;fontSize=8;align=left;\" parent=\"1\" vertex=\"1\">\n                    <mxGeometry x=\"7770\" y=\"526\" width=\"250\" height=\"77\" as=\"geometry\"/>\n                </mxCell>\n                <mxCell id=\"manage-customer-account/register-and-authenticate/register-account/ac-3\" value=\"&lt;b&gt;WHEN&lt;/b&gt; the customer submits a password that does not meet requirements&lt;br/&gt;&lt;b&gt;THEN&lt;/b&gt; the form shows which
