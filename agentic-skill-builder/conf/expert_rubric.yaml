# Public rubric for Expert critique (plan §6) — toy skills and general authoring.
dimensions:
  - id: clarity
    label: Clarity
    prompt: Is the skill purpose and pipeline easy to understand from SKILL.md and AGENTS.md?
  - id: structure
    label: Structure
    prompt: Are phases/stages coherent and ordered for a linear workflow?
  - id: politeness_fit
    label: Politeness fit
    prompt: For dialogue-oriented skills, are tone and closing guidance adequate?

output_schema: |
  Return a JSON object with keys:
  - "scores": object mapping dimension id to integer 1-5
  - "public": array of short bullet strings (actionable, no secrets)
  - "summary": one sentence overall assessment
