{{SKILL_KANBAN_NAV}}

<script>
(function () {
  var s = document.getElementById('catalog-kanban');
  if (!s) return;
  var stage = '';
  try { stage = new URLSearchParams(location.search).get('stage') || ''; } catch (e) {}
  if (!stage) return;
  var page = location.pathname.split('/').pop().split('?')[0];
  s.querySelectorAll('.kb-ticket.aad-skill[data-stage]').forEach(function (el) {
    if (el.classList.contains('foundry-family-toggle')) return;
    var h = (el.getAttribute('data-skill-href') || '').split('?')[0];
    if (h !== page) return;
    el.classList.toggle('kb-ticket--current', el.getAttribute('data-stage') === stage);
  });
  s.querySelectorAll('.kb-col-head[data-stage]').forEach(function (head) {
    head.classList.toggle('kb-col-head--current', head.getAttribute('data-stage') === stage);
  });
})();
</script>
